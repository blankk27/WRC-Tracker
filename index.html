<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Practica RC-241</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      background-color: #007BFF;
      color: white;
      padding: 15px;
      position: relative;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .corner-black {
      position: absolute;
      color: black;
      font-weight: bold;
    }

    .top-left { top: 5px; left: 10px; }
    .top-right { top: 5px; right: 10px; }

    .bottom-left { bottom: 5px; left: 10px; }
    .bottom-right { bottom: 5px; right: 10px; }

    /* Conținut */
    .container {
      display: flex;
      justify-content: space-between;
      padding: 40px;
      flex-grow: 1;
      text-align: center;
    }

    .content-box {
      width: 30%;
    }

    .content-box input,
    .content-box select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }

    .images {
      display: flex;
      justify-content: space-around;
      margin: 30px;
    }

    .images img {
      width: 30%;
      border-radius: 10px;
    }

    .interactions {
      text-align: center;
      margin: 30px;
    }

    .bulina {
      display: inline-block;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background-color: #ccc;
      cursor: pointer;
      margin-right: 10px;
    }

    .bulina.active {
      background-color: #007BFF;
    }

    .footer {
      background-color: #007BFF;
      color: white;
      text-align: center;
      padding: 15px;
      position: relative;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    Practica de Initiere RC-241
    <div class="corner-black top-left">CocieruIlie</div>
    <div class="corner-black top-right">CocieruIlie</div>
  </div>

  <!-- Conținut -->
  <div class="container">
    <div class="content-box">
      <label>Introdu text:</label><br>
      <input type="text" placeholder="Scrie aici...">
    </div>

    <div class="content-box">
      <label>Mediu/Important:</label><br>
      <select>
        <option>Mediu</option>
        <option>Important</option>
      </select>
    </div>

    <div class="content-box calendar-box">
      <label>Selectează data:</label><br>
      <input type="date" id="calendar">
    </div>
  </div>

  <!-- Imagini -->
  <div class="images">
    <img src="https://stanceauto.co.uk/uploads/images/202307/image_870x_64a40926eec39.webp" alt="rally 1">
    <img src="https://capitalexotic.com/wp-content/uploads/2024/06/Best-Rally-Cars-For-Beginners-Capital-Exotic.webp" alt="rally 2">
    <img src="https://www.therallysite.com/wp-content/uploads/2024/07/rally-cars-hatchbacks.jpg" alt="rally 3">
  </div>

  <!-- Interacțiuni -->
  <div class="interactions">
    <div class="bulina" onclick="this.classList.toggle('active')"></div>
    <span>Varianta Corecta</span><br><br>
    <input type="checkbox" id="raspuns">
    <label for="raspuns">Raspuns corect</label>
  </div>

  <!-- Footer -->
  <div class="footer">
    &copy; 2025 WRC Tracker
    <div class="corner-black bottom-left">CocieruIlie</div>
    <div class="corner-black bottom-right">CocieruIlie</div>
  </div>

</body>
</html>
